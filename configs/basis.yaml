# Stage A step 2 — contrastive pair generation + basis extraction (k = 7).
# Pole instructions approved 2026-07-22. Axis names are ordered pos_neg: the
# proxy for each axis is signed so higher = more of the pos pole, and the
# extracted vector is mean(pos activations) - mean(neg activations).

data:
  n_train: 200
  n_heldout: 50
  max_prompt_chars: 400   # tractability filter on local hardware; applied to ALL splits so train/held-out stay same-distribution
  seed: 0

pairs:
  max_new_tokens: 220
  batch_size: 8
  compliance_n: 20        # pairs per axis for the early pole-compliance check

# Activations are captured teacher-forced WITHOUT the pole instruction: the
# instruction elicits the behavior at generation time, but the capture context
# is identical across poles, so the mean difference isolates the behavior
# rather than the reading-of-the-instruction. Layer 21 is the committed
# default; capturing 16/26 in the same pass makes the sweep free if needed.
capture_layers: [12, 16, 20]   # SmolLM2-1.7B has 24 layers; 16 is the committed default

axes:
  - name: challenge_accommodate
    pos: challenge
    neg: accommodate
    pos_instruction: "Critically examine the premise of the user's message. If anything in it is questionable, mistaken, or debatable, say so directly and explain why before helping."
    neg_instruction: "Take the user's framing at face value and be agreeable. Affirm their perspective and work within their assumptions without questioning any of them."

  - name: hedge_assert
    pos: hedge
    neg: assert
    pos_instruction: "Express uncertainty throughout your answer. Qualify your claims, acknowledge you could be wrong, and present alternatives rather than committing to one answer."
    neg_instruction: "Answer with complete confidence. State your conclusions as settled facts, commit to a single answer, and never qualify or second-guess yourself."

  - name: elaborate_concise
    pos: elaborate
    neg: concise
    pos_instruction: "Give a thorough, expansive answer. Cover the background, multiple aspects, examples, and implications of the topic in detail."
    neg_instruction: "Answer in as few words as possible while staying correct. No preamble, no examples, no elaboration beyond the direct answer."

  - name: formal_casual
    pos: formal
    neg: casual
    pos_instruction: "Write in a formal register: precise vocabulary, complete grammatical sentences, an impersonal tone, and no colloquial expressions."
    neg_instruction: "Write casually, like you're texting a friend: relaxed everyday language, loose sentence structure, and a personal, informal tone."

  - name: cautious_direct
    pos: cautious
    neg: direct
    # strengthened 2026-07-22 after compliance check: 360M ignored the milder wording
    pos_instruction: "You must include explicit warnings in every answer. Describe the risks, exceptions, and edge cases where your answer could fail or not apply, and advise the user to verify important details or seek expert help before acting."
    neg_instruction: "Get straight to the actionable answer. Never warn the user, never add disclaimers, and never advise them to seek information or help anywhere else - state only what to do."

  - name: warm_neutral
    pos: warm
    neg: neutral
    pos_instruction: "Be warm and personable. Acknowledge the user's situation, use friendly and encouraging language, and show genuine interest in helping them."
    neg_instruction: "Be strictly informational. Use no emotional or encouraging language and do not address the user personally - just deliver the content in a detached tone."

  - name: inquire_proceed
    pos: inquire
    neg: proceed
    # v3 2026-07-22: even 1.7B only asked questions on 2/20 prompts under v2's
    # "ask then answer" wording — the answer-first prior wins whenever the model
    # thinks it can answer. Categorical wording removes the conflict: the
    # response IS the questions. Poles are meant to be extreme; alpha doses it.
    pos_instruction: "Do not answer the user's request yet. Your entire response must be two or three clarifying questions addressed to the user about their situation, needs, or constraints. Ask your questions and stop."
    neg_instruction: "Never ask the user anything. Make reasonable assumptions about anything unspecified and give the most complete answer you can with the information you already have."
