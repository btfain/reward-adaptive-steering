# Escalated 360M -> 1.7B on 2026-07-22: 360M failed pole compliance on
# cautious_direct and inquire_proceed under two instruction strengths (see
# data/compliance/). Sanctioned escalation path per PLAN.md.
base_model: HuggingFaceTB/SmolLM2-1.7B-Instruct
reward_model: Skywork/Skywork-Reward-V2-Qwen3-0.6B

device: auto        # resolves to mps > cuda > cpu
dtype: auto         # bf16 on cuda, float32 elsewhere; vector arithmetic stays fp32

# Residual-stream layer for extraction and steering (~2/3 depth of 24).
# Stage A may sweep {12, 16, 20} if steering is weak — sweep before further scale bumps.
steer_layer: 16

generation:
  max_new_tokens: 256
  do_sample: true
  temperature: 0.7
  top_p: 0.9

data:
  prompt_dataset: HuggingFaceH4/ultrafeedback_binarized
  prompt_split: train_prefs
  prompt_field: prompt

seed: 0
